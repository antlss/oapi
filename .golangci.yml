# golangci-lint v2 configuration for the oapi multi-module workspace.
# Production-grade but not pedantic. Each adapter/example module is linted
# separately in CI (working-directory per module), so this config is shared.
# Migrated from v1 with `golangci-lint migrate`; pinned to v2 in CI.
version: "2"
run:
  tests: true
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unconvert
    - unparam
  settings:
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - unnamedResult
        - ifElseChain
        - whyNoLint # don't require a reason comment on every //nolint directive
      enabled-tags:
        - diagnostic
        - performance
        - style
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    revive:
      rules:
        - name: exported
          disabled: false
        - name: var-naming
        - name: indent-error-flow
        - name: error-return
        - name: error-naming
        - name: context-as-argument
        - name: receiver-naming
        - name: unreachable-code
        - name: redefines-builtin-id
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gocritic
          - revive
          - unparam
        path: _test\.go
      - linters:
          - revive
          - unparam
        path: tools/

    # examples/api is illustrative demo code linted as its own module (paths are
    # module-relative, hence `api/`); relax revive's naming nitpicks there.
      - linters:
          - revive
        path: (^|/)api/
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/antlss/oapi
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
