name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# This is a multi-module Go workspace. Each module has its own go.mod, so most
# jobs run per module via a matrix. The adapter/examples modules use dev-only
# `replace ... => ..` directives pointing at local paths, so the in-place build
# in CI works without published tags.

jobs:
  build-test:
    name: build / vet / test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapter/gin"
          - "adapter/fiber"
          - "examples"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test (race)
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: false

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-compliant:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

  golangci-lint:
    name: golangci-lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapter/gin"
          - "adapter/fiber"
          - "examples"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ${{ matrix.module }}

  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapter/gin"
          - "adapter/fiber"
          - "examples"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...
