                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        properties:
                                            category:
                                                example: electronics
                                                type: string
                                            created_at:
                                                example: "2026-01-02T15:04:05Z"
                                                format: date-time
                                                type: string
                                            currency:
                                                example: USD
                                                type: string
                                            id:
                                                example: 1001
                                                type: integer
                                            in_stock:
                                                example: true
                                                type: boolean
                                            name:
                                                example: Mechanical Keyboard
                                                type: string
                                            price:
                                                example: 49.9
                                                format: double
                                                type: number
                                            sku:
                                                example: 5f9c2e3a-1b4d-4c8e-9f0a-2b3c4d5e6f70
                                                type: string
                                            tags:
                                                example:
                                                    - new
                                                    - featured
                                                items:
                                                    type: string
                                                type: array
                                            warehouse:
                                                properties:
                                                    city:
                                                        example: Tokyo
                                                        type: string
                                                    country:
                                                        example: JP
                                                        type: string
                                                    line1:
                                                        example: 1-2-3 Shibuya
                                                        type: string
                                                type: object
                                        type: object
                                type: object
                    description: Created
                "409":
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        properties:
                                            code:
                                                example: bad_request
                                                type: string
                                            fields:
                                                items:
                                                    properties:
                                                        field:
                                                            example: email
                                                            type: string
                                                        message:
                                                            example: email is required
                                                            type: string
                                                        rule:
                                                            example: required
                                                            type: string
                                                    type: object
                                                type: array
                                            message:
                                                example: request validation failed
                                                type: string
                                        type: object
                                type: object
                    description: Duplicate SKU
                "422":
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        properties:
                                            code:
                                                example: bad_request
                                                type: string
                                            fields:
                                                items:
                                                    properties:
                                                        field:
                                                            example: email
                                                            type: string
                                                        message:
                                                            example: email is required
                                                            type: string
                                                        rule:
                                                            example: required
                                                            type: string
                                                    type: object
                                                type: array
                                            message:
                                                example: request validation failed
                                                type: string
                                        type: object
                                type: object
                    description: Validation failed
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        properties:
                                            code:
                                                example: bad_request
                                                type: string
                                            fields:
                                                items:
                                                    properties:
                                                        field:
                                                            example: email
                                                            type: string
                                                        message:
                                                            example: email is required
                                                            type: string
                                                        rule:
                                                            example: required
                                                            type: string
                                                    type: object
                                                type: array
                                            message:
                                                example: request validation failed
                                                type: string
                                        type: object
                                type: object
                    description: Error
            security:
                - bearerAuth:
                    - products:write
            summary: Create a product
            tags:
                - catalog
