components:
    securitySchemes:
        apiKey:
            in: header
            name: X-API-Key
            type: apiKey
        bearerAuth:
            scheme: bearer
            type: http
externalDocs:
    description: Full developer guides
    url: https://docs.example.com
info:
    contact:
        email: api@example.com
        name: Catalog API Team
        url: https://example.com/support
    description: 'A demo API exercising every capability of the oapi library: typed binding, validation-driven docs, files, paging, security, typed middleware and the full error model.'
    license:
        name: Apache-2.0
        url: https://www.apache.org/licenses/LICENSE-2.0
    termsOfService: https://example.com/terms
    title: Catalog API
    version: v1
    x-logo:
        url: https://redocly.github.io/redoc/petstore-logo.png
openapi: 3.0.3
paths:
    /assets/{path}:
        get:
            operationId: get_assets_path
            parameters:
                - in: header
                  name: X-API-Key
                  required: true
                  schema:
                    example: sk_live_8f3a1c
                    type: string
                - in: path
                  name: path
                  required: true
                  schema:
                    example: images/logo.png
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        properties:
                                            path:
                                                example: images/logo.png
                                                type: string
                                        type: object
                                type: object
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        properties:
                                            code:
                                                example: bad_request
                                                type: string
                                            fields:
                                                items:
                                                    properties:
                                                        field:
                                                            example: email
                                                            type: string
                                                        message:
                                                            example: email is required
                                                            type: string
                                                        rule:
                                                            example: required
                                                            type: string
                                                    type: object
                                                type: array
                                            message:
                                                example: request validation failed
                                                type: string
                                        type: object
                                type: object
                    description: Error
            security:
                - apiKey: []
            summary: Fetch an asset by path
            tags:
                - assets
    /products:
        get:
            description: Search and page the catalog. Shows embedded query structs, enum/bound parameters and pagination meta.
            operationId: get_products
            parameters:
                - in: query
                  name: page
                  schema:
                    example: 1
                    minimum: 1
                    type: integer
                - in: query
                  name: per_page
                  schema:
                    example: 20
                    maximum: 100
                    minimum: 1
                    type: integer
                - in: query
                  name: sort
                  schema:
                    enum:
                        - name
                        - -name
                        - price
                        - -price
                        - created_at
                    example: -price
                    type: string
                - in: query
                  name: q
                  schema:
                    example: keyboard
                    maxLength: 100
                    type: string
                - in: query
                  name: category
                  schema:
                    enum:
                        - book
                        - electronics
                        - food
                        - toy
                    example: electronics
                    type: string
                - in: query
                  name: in_stock
                  schema:
                    example: true
                    type: boolean
                - in: query
                  name: created_from
                  schema:
                    example: "2026-01-01T00:00:00Z"
                    type: string
                - in: query
                  name: created_to
                  schema:
                    example: "2026-12-31T23:59:59Z"
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                properties:
                                    data:
                                        items:
                                            properties:
                                                category:
                                                    example: electronics
                                                    type: string
                                                created_at:
                                                    example: "2026-01-02T15:04:05Z"
                                                    format: date-time
                                                    type: string
                                                currency:
                                                    example: USD
                                                    type: string
                                                id:
                                                    example: 1001
                                                    type: integer
                                                in_stock:
                                                    example: true
                                                    type: boolean
                                                name:
                                                    example: Mechanical Keyboard
                                                    type: string
                                                price:
                                                    example: 49.9
                                                    format: double
                                                    type: number
                                                sku:
                                                    example: 5f9c2e3a-1b4d-4c8e-9f0a-2b3c4d5e6f70
                                                    type: string
                                                tags:
                                                    example:
                                                        - new
                                                        - featured
                                                    items:
                                                        type: string
                                                    type: array
                                                warehouse:
                                                    properties:
                                                        city:
                                                            example: Tokyo
                                                            type: string
                                                        country:
                                                            example: JP
                                                            type: string
                                                        line1:
                                                            example: 1-2-3 Shibuya
                                                            type: string
                                                    type: object
                                            type: object
                                        type: array
                                    meta:
                                        properties:
                                            count:
                                                example: 137
                                                format: int64
                                                type: integer
                                            current:
                                                example: 1
                                                type: integer
                                            pages:
                                                example: 7
                                                type: integer
                                            per_page:
                                                example: 20
                                                type: integer
                                        type: object
                                type: object
                    description: OK
                default:
                    content:
                        application/json:
                            schema:
                                properties:
                                    error:
                                        properties:
                                            code:
                                                example: bad_request
                                                type: string
                                            fields:
                                                items:
                                                    properties:
                                                        field:
                                                            example: email
                                                            type: string
                                                        message:
                                                            example: email is required
                                                            type: string
                                                        rule:
                                                            example: required
                                                            type: string
                                                    type: object
                                                type: array
                                            message:
                                                example: request validation failed
                                                type: string
                                        type: object
                                type: object
                    description: Error
            summary: List products
            tags:
                - catalog
        post:
            operationId: post_products
            requestBody:
                content:
                    application/json:
                        schema:
                            properties:
                                category:
                                    enum:
                                        - book
                                        - electronics
                                        - food
                                        - toy
