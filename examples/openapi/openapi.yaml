                                    minLength: 2
                                    type: string
                                price:
                                    example: 49.9
                                    exclusiveMinimum: true
                                    format: double
                                    minimum: 0
                                    type: number
                                sku:
                                    example: 5f9c2e3a-1b4d-4c8e-9f0a-2b3c4d5e6f70
