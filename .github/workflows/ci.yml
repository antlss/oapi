name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so quick successive pushes/PR updates
# don't pile up and waste runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# This is a multi-module Go workspace. Each module has its own go.mod, so most
# jobs run per module via a matrix. The adapter/examples modules use dev-only
# `replace ... => ..` directives pointing at local paths, so the in-place build
# in CI works without published tags.

jobs:
  build-test:
    name: build / vet / test (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapter/gin"
          - "adapter/fiber"
          - "adapter/chi"
          - "adapter/echo"
          - "examples"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          # Resolve the newest 1.25 patch from the manifest instead of reusing
          # the runner's preinstalled (possibly stale) toolchain.
          check-latest: true
          cache: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: go build
        working-directory: ${{ matrix.module }}
        run: go build ./...

      - name: go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: go test (race)
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: false

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-compliant:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

  golangci-lint:
    name: golangci-lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapter/gin"
          - "adapter/fiber"
          - "adapter/chi"
          - "adapter/echo"
          - "examples"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.7.2
          working-directory: ${{ matrix.module }}

  govulncheck:
    name: govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - "adapter/gin"
          - "adapter/fiber"
          - "adapter/chi"
          - "adapter/echo"
          - "examples"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          # govulncheck reports stdlib CVEs against the toolchain version, so we
          # must build/scan with the newest patched 1.25 release, not the cached one.
          check-latest: true
          cache: true
          cache-dependency-path: "${{ matrix.module }}/go.sum"

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: govulncheck
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...
